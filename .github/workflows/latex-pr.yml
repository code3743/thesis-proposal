name: Build LaTeX PDF (PR)

on:
  pull_request:
    branches: [ main ]

jobs:
  build-latex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex 
          latexmk_use_xelatex: true 

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: tesis-pdf
          path: main.pdf      
