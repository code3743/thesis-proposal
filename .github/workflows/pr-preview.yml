name: PR PDF Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
      - name: Prepare preview files
        run: |
          mkdir -p preview/pr-${{ github.event.number }}

          cp main.pdf preview/pr-${{ github.event.number }}/thesis.pdf

          cat << 'EOF' > preview/pr-${{ github.event.number }}/index.html
          <!DOCTYPE html>
          <html lang="es">
            <head>
              <meta charset="utf-8" />
              <title>Preview PDF – PR #${{ github.event.number }}</title>
              <style>
                body { margin: 0; }
                iframe { border: none; }
              </style>
            </head>
            <body>
              <iframe src="thesis.pdf" width="100%" height="1000px"></iframe>
            </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./preview
          keep_files: true
          cname: jotalopez.dev

      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = `https://jotalopez.dev/pr-${pr}/`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: `📄 **Preview del PDF actualizado**:\n\n👉 ${url}`
            });

